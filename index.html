<h2>Azure AD = 微软的"中央空调"</h2>
<p>Azure Active Directory（现称 <strong>Microsoft Entra ID</strong>）是云端身份服务。简单理解：</p>
<div class="callout">
  员工账号、权限、应用授权——全部在 Azure AD 里管。就像大楼的中央空调：所有房间（微软服务）都从同一个地方获取暖气（身份验证）。
</div>

<h3>核心能力</h3>
<ul>
  <li><strong>SSO（单点登录）</strong>：一次登录，访问所有已授权应用（Teams、Outlook、Azure、SharePoint...）</li>
  <li><strong>MFA（多因素认证）</strong>：密码+手机验证码，双重保险</li>
  <li><strong>Conditional Access（条件访问）</strong>：基于位置/设备/风险决定谁能登录</li>
  <li><strong>应用单一登录</strong>：SAML / OIDC / OAuth 集成</li>
</ul>

<h3>Azure AD vs 传统 AD</h3>
<div class="cgrid">
  <div class="ci">
    <div class="term">传统 AD（本地）</div>

<h3>与 Unicorn 的关系</h3>
<p>Unicorn 的 Cloud PBX 系统（如 Teams Direct Routing）依赖 Azure AD 做身份验证——谁可以用哪个分机、谁可以听录音、谁可以改配置，全在 Azure AD 里管。</p>

<p>面试经常会问："Conditional Access 什么时候触发？"最好的回答是结合场景：</p>

<h2>为什么需要虚拟化？</h2>
<p>传统做法：一台物理服务器跑一个应用 → 资源浪费 + 管理复杂。</p>
<div class="callout">
  虚拟化：在一台物理服务器上同时跑多个"假电脑"（虚拟机），就像公寓隔间——共享硬件，独立运行。
</div>

<h3>核心组件</h3>
<ul>
  <li><strong>ESXi / vSphere</strong>：安装在每台物理机上的虚拟化平台（"房东"）</li>
  <li><strong>VM（虚拟机）</strong>：虚拟化出来的"假电脑"，每台跑一个操作系统</li>
  <li><strong>vSAN</strong>：VMware 的软件定义存储，把本地磁盘变成共享存储池</li>
  <li><strong>vCenter</strong>：管理多个 ESXi 主机的中央控制台（"物业管理系统"）</li>
  <li><strong>vMotion</strong>：热迁移 VM 到另一台主机，业务不中断</li>
</ul>

<h3>Unicorn 的实际场景</h3>
<p>Unicorn IT 托管客户里，很多中型企业把服务器从本地迁到 HCI 平台。HCI 让 Unicorn 可以用更少的人管理更多客户的服务器——这是 MSP（托管服务提供商）的核心竞争力。</p>

<h2>vSAN：HCI 的存储层</h2>
<p>vSAN 把每个 ESXi 节点的本地磁盘聚合成分布式共享存储，替代传统 SAN。</p>

<h3>vSAN 数据冗余机制</h3>
<ul>
  <li><strong>镜像模式（2副本）</strong>：每份数据存 2 份，放不同节点。N节点可用容量 ≈ N×磁盘/2</li>
  <li><strong>纠删码（Erasure Coding）</strong>：更高空间效率但更低性能，适合存档数据</li>
  <li><strong>故障域（Failure Domain）</strong>：指定哪些节点不能同时故障，避免单点</li>
</ul>

<div class="callout yellow">
  <strong>面试计算题：</strong>3节点集群，每节点 500GB SSD，2副本模式。可用容量？<br>
  答案：总容量 1500GB ÷ 2副本 ≈ <strong>500GB 可用</strong>（未计纠删码开销，实际更少）
</div>

<h3>vMotion：零停机迁移</h3>
<p>vMotion 可以在不关机的情况下，把运行中的 VM 从一台 ESXi 主机迁移到另一台——用于硬件维护、负载均衡、故障恢复。业务完全不中断。</p>

<h3>HA：故障自动恢复</h3>

// ═══════════════════════════════════════════════════
// STATE MANAGEMENT
// ═══════════════════════════════════════════════════

const KEYS = ['pre','day1','day2','day3','day4','day5','day6'];
const SKEY = 'unicorn-ms365-v2';

function load() { try { return JSON.parse(localStorage.getItem(SKEY)||'{}'); } catch { return {}; } }
function save(s) { localStorage.setItem(SKEY, JSON.stringify(s)); }

function done(day, id) {
  const st = load();
  if (!st[day]) st[day] = [];
  if (!st[day].includes(id)) st[day].push(id);
  save(st);
}

function isDone(day, id) {
  return (load()[day]||[]).includes(id);
}

function dayDone(day) {
  const dd = DATA[day];
  if (!dd) return false;
  return (load()[day]||[]).length >= dd.steps.filter(s=>s.type!=='complete').length;
}

function doneDays() { return KEYS.filter(d=>dayDone(d)).length; }

function totalProgress() {
  let total=0,done=0;
  KEYS.forEach(day => {
    const steps = DATA[day].steps.filter(s=>s.type!=='complete');
    total += steps.length;
    done += (load()[day]||[]).filter(id=>steps.some(s=>s.id===id)).length;
  });
  return total>0 ? Math.round(done/total*100) : 0;
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════

let curDay='pre', curIdx=0;

function navigate(day, idx) {
  curDay=day; curIdx=idx;
  const s=load(); s._d=day; s._i=idx; save(s);
  renderAll();
  window.scrollTo(0,0);
}

function fwd() {
  const dayData = DATA[curDay];
  const step = dayData.steps[curIdx];
  if (step.type !== 'complete') done(curDay, step.id);

  if (curIdx < dayData.steps.length-1) {
    navigate(curDay, curIdx+1);
  } else {
    const di = KEYS.indexOf(curDay);
    if (di < KEYS.length-1) navigate(KEYS[di+1], 0);
  }
}

function back() {
  if (curIdx > 0) { navigate(curDay, curIdx-1); return; }
  const di = KEYS.indexOf(curDay);
  if (di > 0) {
    const prev = KEYS[di-1];
    navigate(prev, DATA[prev].steps.length-1);
  }
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════

function renderSidebar() {
  const sb = document.getElementById('sidebar');
  let h = '<div class="sidebar-section"><div class="sidebar-section-label">🦄 Unicorn NZ 面试速成</div>';
  KEYS.forEach(k => {
    const d = DATA[k];
    const dn = dayDone(k);
    const act = curDay===k;
    const icon = dn?'✅':act?'▶️':'⬜';
    h += `<button class="module-btn${act?' active':''}${dn?' done':''}" onclick="navigate('${k}',0)">
      <span class="si">${icon}</span>
      <span class="ml"><span class="mn">${d.title.split('·')[0].trim()}</span><span class="ms">${d.subtitle}</span></span>
    </button>`;
  });
  h += '</div>';
  sb.innerHTML = h;
  document.getElementById('mb').textContent = DATA[curDay].title.split('·')[0].trim();
  document.getElementById('sb').textContent = `🔥 ${doneDays()}/${KEYS.length} 天`;
}

function updateProgress() {
  document.getElementById('pct').textContent = totalProgress()+'%';
  document.getElementById('pfill').style.width = totalProgress()+'%';
}

function renderStep() {
  const main = document.getElementById('main');
  const dayData = DATA[curDay];
  const step = dayData.steps[curIdx];
  const isComplete = step.type === 'complete' || isDone(curDay, step.id);

  // pips
  let pips = '';
  const steps = dayData.steps;
  steps.forEach((s,i) => {
    const cls = i<curIdx?'done':i===curIdx?'active':'';
    pips += `<div class="pip ${cls}"></div>`;
  });

  let content = '';
  if (step.type === 'concept' || step.type === 'code') {
    content = step.content;
  } else if (step.type === 'quiz') {
    content = renderQuiz(step);
  } else if (step.type === 'complete') {
    main.innerHTML = `<div class="step-ind">${pips}<span class="smet">${step.title} · ${curIdx+1}/${steps.length}</span></div>${step.content}`;
    return;
  }

  const isFirst = curIdx===0 && KEYS.indexOf(curDay)===0;
  main.innerHTML = `
    <div class="step-ind">${pips}<span class="smet">${step.title} · ${curIdx+1}/${steps.length}</span></div>
    <div class="card">${content}</div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="back()" ${isFirst?'disabled':''}>← 上一步</button>
      <button class="btn btn-primary" onclick="fwd()">${step.type==='quiz'?'确认答案 →':'完成并继续 →'}</button>
    </div>`;

  if (step.type === 'quiz') wireQuiz(step);
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.closest('.code-block').querySelector('code')?.innerText || '';
      if (code) { navigator.clipboard.writeText(code); btn.textContent='已复制!'; setTimeout(()=>btn.textContent='复制',1500); }
    });
  });
}

function renderQuiz(step) {
  let h='';
  step.questions.forEach((q,qi) => {
    const opts = q.options.map((o,oi)=>`
      <div class="quiz-opt" data-qi="${qi}" data-oi="${oi}" onclick="selOpt(this,${qi},${oi},${q.answer})">
        <span class="ol">${String.fromCharCode(65+oi)}</span><span>${o}</span>
      </div>`).join('');
    h += `<div class="quiz-card" id="qc${qi}">
      <div class="quiz-q">${qi+1}. ${q.q}</div>
      <div class="quiz-opts">${opts}</div>
      <div class="qfb" id="fb${qi}"></div>
    </div>`;
  });
  return h;
}

function wireQuiz(step) {
  const st=load();
  const qk=`q-${curDay}-${curIdx}`;
  const saved=st[qk]||{};
  Object.entries(saved).forEach(([qi,sOi])=>{
    const q=step.questions[parseInt(qi)];
    const card=document.getElementById('qc'+qi);
    if(!card) return;
    const oi=parseInt(sOi);
    card.querySelectorAll('.quiz-opt').forEach(o=>o.classList.add('disabled'));
    const sel=card.querySelector(`[data-oi="${oi}"]`);
    const cor=card.querySelector(`[data-oi="${q.answer}"]`);
    sel.classList.add(oi===q.answer?'correct':'wrong');
    if(oi!==q.answer) cor.classList.add('correct');
    const fb=document.getElementById('fb'+qi);
    fb.className=`qfb show ${oi===q.answer?'correct':'wrong'}`;
    fb.innerHTML=oi===q.answer?`✅ 正确！${q.explanation}`:`❌ 不对。${q.explanation}`;
  });
}

function selOpt(el, qi, oi, answer) {
  if(el.classList.contains('disabled')) return;
  const st=load();
  const qk=`q-${curDay}-${curIdx}`;
  if(!st[qk]) st[qk]={};
  st[qk][qi]=oi;
  save(st);

  const card=el.closest('.quiz-card');
  const q=DATA[curDay].steps[curIdx].questions[qi];
  card.querySelectorAll('.quiz-opt').forEach(o=>o.classList.add('disabled'));
  const cor=card.querySelector(`[data-oi="${q.answer}"]`);
  el.classList.add(oi===q.answer?'correct':'wrong');
  if(oi!==q.answer) cor.classList.add('correct');
  const fb=document.getElementById('fb'+qi);
  fb.className=`qfb show ${oi===q.answer?'correct':'wrong'}`;
  fb.innerHTML=oi===q.answer?`✅ 正确！${q.explanation}`:`❌ 不对。${q.explanation}`;
}

function renderAll() { renderSidebar(); updateProgress(); renderStep(); }

// Restore
const init=load();
if(init._d && DATA[init._d]) navigate(init._d, init._i||0);
else navigate('pre',0);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unicorn NZ · MS365 & HCI 面试完全指南</title>
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3350;
      --accent: #4f8ef7; --accent2: #7c5af0; --green: #3ecf8e; --red: #f47067;
      --yellow: #f0b642; --orange: #f0963c; --text: #e2e4ef; --text-dim: #8b8fa8;
      --radius: 12px; --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 58px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo { font-weight: 700; font-size: 1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .pb-wrap { flex: 1; max-width: 340px; margin: 0 28px; }
    .pb-label { font-size: 0.72rem; color: var(--text-dim); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .pb-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
    .pb-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 0.4s; width: 0%; }
    .badges { display: flex; gap: 8px; }
    .badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 3px 11px; font-size: 0.75rem; color: var(--text-dim); white-space: nowrap; }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; }

    /* ── Sidebar ── */
    .sidebar { width: 258px; background: var(--surface); border-right: 1px solid var(--border); padding: 18px 10px; overflow-y: auto; flex-shrink: 0; }
    .ss { margin-bottom: 18px; }
    .ssl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); padding: 0 8px; margin-bottom: 5px; }
    .mbtn { width: 100%; text-align: left; background: none; border: 1px solid transparent; color: var(--text); padding: 8px 9px; border-radius: 7px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 7px; transition: all 0.15s; margin-bottom: 1px; }
    .mbtn:hover { background: var(--surface2); }
    .mbtn.active { background: var(--surface2); border-color: var(--border); }
    .mbtn.done .si { color: var(--green); }
    .mbtn.active .si { color: var(--accent); }
    .si { font-size: 0.72rem; width: 17px; text-align: center; flex-shrink: 0; }
    .ml { display: flex; flex-direction: column; }
    .mn { font-weight: 500; }
    .ms { font-size: 0.68rem; color: var(--text-dim); }

    /* ── Main ── */
    .main { flex: 1; padding: 32px 44px; max-width: 880px; overflow-y: auto; }

    /* ── Step ── */
    .step-ind { display: flex; align-items: center; gap: 5px; margin-bottom: 24px; flex-wrap: wrap; }
    .pip { height: 3px; flex: 1; min-width: 20px; border-radius: 99px; background: var(--border); transition: background 0.3s; }
    .pip.done { background: var(--green); }
    .pip.active { background: var(--accent); }
    .smet { font-size: 0.75rem; color: var(--text-dim); margin-left: 6px; white-space: nowrap; }

    /* ── Card ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px 30px; margin-bottom: 18px; }
    .card h2 { font-size: 1.3rem; margin-bottom: 9px; }
    .card h3 { font-size: 0.97rem; color: var(--accent); margin: 18px 0 9px; }
    .card p { line-height: 1.75; color: var(--text-dim); margin-bottom: 12px; }
    .card ul { list-style: none; margin: 9px 0; }
    .card li { padding: 5px 0 5px 17px; position: relative; color: var(--text-dim); line-height: 1.65; }
    .card li::before { content: '›'; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .card li strong { color: var(--text); }

    /* ── Callout ── */
    .callout { background: var(--surface2); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 13px 17px; margin: 12px 0; font-size: 0.88rem; line-height: 1.65; }
    .callout.green { border-color: var(--green); }
    .callout.yellow { border-color: var(--yellow); }
    .callout.red { border-color: var(--red); }
    .callout.orange { border-color: var(--orange); }

    /* ── NOTE BOX (handwriting) ── */
    .note-box { background: rgba(240,182,66,0.07); border: 1.5px dashed var(--yellow); border-radius: var(--radius); padding: 18px 22px; margin: 14px 0; }
    .note-box .note-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .note-box .note-icon { font-size: 1.1rem; }
    .note-box .note-title { font-size: 0.85rem; font-weight: 700; color: var(--yellow); text-transform: uppercase; letter-spacing: 0.06em; }
    .note-box .note-prompt { font-size: 0.85rem; color: var(--text-dim); line-height: 1.6; }
    .note-box textarea { width: 100%; background: rgba(240,182,66,0.08); border: 1px solid rgba(240,182,66,0.3); border-radius: 8px; padding: 10px 13px; color: var(--text); font-family: var(--font); font-size: 0.85rem; resize: vertical; min-height: 72px; margin-top: 8px; outline: none; }
    .note-box textarea:focus { border-color: var(--yellow); }
    .note-box textarea::placeholder { color: rgba(240,182,66,0.5); }

    /* ── UNICORN banner ── */
    .co-banner { background: linear-gradient(135deg, rgba(79,142,247,0.12), rgba(124,90,240,0.12)); border: 1px solid rgba(79,142,247,0.28); border-radius: var(--radius); padding: 18px 22px; margin-bottom: 18px; }
    .co-banner h2 { font-size: 1.05rem; margin-bottom: 7px; }
    .co-banner p { color: var(--text-dim); font-size: 0.85rem; line-height: 1.6; margin: 0 0 10px; }
    .tag { display: inline-block; background: var(--accent2); color: #fff; border-radius: 99px; padding: 2px 9px; font-size: 0.7rem; margin-right: 5px; margin-bottom: 3px; }
    .stats { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 10px; }
    .stat { display: flex; flex-direction: column; }
    .stat-n { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
    .stat-l { font-size: 0.72rem; color: var(--text-dim); }

    /* ── Cheatsheet ── */
    .csheet { background: var(--surface); border: 1px solid var(--yellow); border-radius: var(--radius); padding: 22px 26px; margin: 14px 0; }
    .csheet h3 { color: var(--yellow); font-size: 0.95rem; margin: 0 0 12px; }
    .ct { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .ct th { text-align: left; padding: 7px 11px; background: var(--surface2); border-bottom: 1px solid var(--border); color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .ct td { padding: 8px 11px; border-bottom: 1px solid var(--border); color: var(--text-dim); vertical-align: top; }
    .ct tr:last-child td { border-bottom: none; }
    .ct td:first-child { color: var(--text); font-weight: 600; white-space: nowrap; }

    /* ── Code/Terminal ── */
    .code-block, .terminal { background: #0d1117; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin: 12px 0; }
    .cb-h, .tt-h { background: var(--surface2); padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .lang { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
    .cpy { background: none; border: 1px solid var(--border); color: var(--text-dim); padding: 2px 8px; border-radius: 5px; cursor: pointer; font-size: 0.7rem; transition: all 0.15s; }
    .cpy:hover { border-color: var(--accent); color: var(--accent); }
    .tt-h { gap: 5px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }
    .tt { padding: 14px 18px; font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 0.83rem; line-height: 1.75; white-space: pre-wrap; }
    .tl { color: #8b8fa8; }
    .tl.cmd { color: #e2e4ef; }
    .tl.cmd::before { content: '$ '; color: var(--green); }
    .tl.out { color: #79c0ff; }
    .tl.ok { color: var(--green); }
    .tl.err { color: var(--red); }

    /* ── Quiz ── */
    .qcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 26px; margin: 12px 0; }
    .qq { font-size: 0.95rem; font-weight: 600; margin-bottom: 14px; line-height: 1.5; }
    .qopts { display: flex; flex-direction: column; gap: 7px; }
    .qopt { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 11px 14px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 9px; font-size: 0.88rem; }
    .qopt:hover:not(.disabled) { border-color: var(--accent); }
    .qopt.sel { border-color: var(--accent); background: rgba(79,142,247,0.1); }
    .qopt.correct { border-color: var(--green); background: rgba(62,207,142,0.1); }
    .qopt.wrong { border-color: var(--red); background: rgba(244,112,103,0.1); }
    .qopt.disabled { cursor: default; opacity: 0.6; }
    .ol { width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
    .qfb { margin-top: 10px; padding: 10px 14px; border-radius: 7px; font-size: 0.85rem; display: none; }
    .qfb.show { display: block; }
    .qfb.correct { background: rgba(62,207,142,0.1); border: 1px solid var(--green); color: var(--green); }
    .qfb.wrong { background: rgba(244,112,103,0.1); border: 1px solid var(--red); color: var(--red); }

    /* ── Nav ── */
    .nav { display: flex; justify-content: space-between; align-items: center; margin-top: 26px; padding-top: 18px; border-top: 1px solid var(--border); }
    .btn { padding: 8px 20px; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text-dim); }
    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
    .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.28; cursor: not-allowed; transform: none; }

    /* ── Misc ── */
    code { background: var(--surface2); padding: 2px 5px; border-radius: 4px; font-family: 'Cascadia Code',monospace; font-size: 0.83em; color: #79c0ff; }
    .cgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin: 10px 0; }
    .ci { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 11px 13px; }
    .ci .term { font-weight: 600; font-size: 0.83rem; margin-bottom: 2px; color: var(--accent); }
    .ci .desc { font-size: 0.78rem; color: var(--text-dim); line-height: 1.5; }
    .tgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin: 10px 0; }
    .ti { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 11px 13px; text-align: center; }
    .ti .tn { font-size: 1.3rem; margin-bottom: 3px; }
    .ti .td { font-size: 0.75rem; color: var(--text-dim); }
    .done-screen { text-align: center; padding: 44px 28px; }
    .done-icon { font-size: 3.2rem; margin-bottom: 14px; }
    .done-screen h2 { font-size: 1.5rem; margin-bottom: 9px; }
    .done-screen p { color: var(--text-dim); max-width: 440px; margin: 0 auto 22px; line-height: 1.65; }
    .checklist { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px 26px; margin: 14px 0; }
    .checklist h3 { font-size: 0.95rem; margin-bottom: 14px; color: var(--text); }
    .cli { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.88rem; color: var(--text-dim); }
    .cli:last-child { border-bottom: none; }
    .cli input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .cli.done { text-decoration: line-through; opacity: 0.5; }
    @media (max-width: 768px) { .sidebar { display: none; } .main { padding: 18px 14px; } .cgrid, .tgrid { grid-template-columns: 1fr; } }
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>

<h2>HCI（超融合基础架构）</h2>
<div class="cgrid">
  <div class="ci"><div class="term">超融合 = 计算+存储+网络融合在一个节点</div><div class="desc">传统架构：计算/存储/网络分开买、分开管。HCI：每个节点同时提供计算+存储+网络，横向扩展（加节点=同时加所有资源）。</div></div>

  <li><strong>vSAN</strong>：VMware 软件定义存储，把本地磁盘聚合成分布式共享存储池</li>
  <li><strong>vCenter</strong>：管理多个 ESXi 主机的中央控制台（"物业管理系统"）</li>
  <li><strong>vMotion</strong>：热迁移运行中的 VM，硬件维护不影响业务</li>
  <li><strong>HA（高可用）</strong>：节点故障时 VM 自动重启，恢复时间 < 5 分钟</li>

<h2>零信任 = "永不信任，总是验证"</h2>

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
const KEYS = ['mod0','mod1','mod2','mod3','mod4','mod5','mod6','mod7','mod8'];
const SKEY = 'unicorn-ms365-v3';

function load() { try { return JSON.parse(localStorage.getItem(SKEY)||'{}'); } catch { return {}; } }
function save(s) { localStorage.setItem(SKEY, JSON.stringify(s)); }

function done(day, id) {
  const st = load();
  if (!st[day]) st[day] = [];
  if (!st[day].includes(id)) { st[day].push(id); save(st); }
}

function isDone(day, id) { return (load()[day]||[]).includes(id); }

function modDone(mod) {
  const d = DATA[mod];
  if (!d) return false;
  const steps = d.steps.filter(s=>s.type!=='complete' && s.type!=='note');
  return steps.every(s=>isDone(mod,s.id));
}

function doneCount() { return KEYS.filter(k=>modDone(k)).length; }

function totalPct() {
  let total=0,done=0;
  KEYS.forEach(k => {
    const steps = DATA[k].steps.filter(s=>s.type!=='complete' && s.type!=='note');
    total += steps.length;
    done += steps.filter(s=>isDone(k,s.id)).length;
  });
  return total>0 ? Math.round(done/total*100) : 0;
}

// ═══════════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════════
let cur='mod0', curI=0;

function navigate(mod,idx) {
  cur=mod; curI=idx;
  const s=load(); s._d=mod; s._i=idx; save(s);
  renderAll();
  window.scrollTo(0,0);
}

function fwd() {
  const d=DATA[cur];
  const step=d.steps[curI];
  if(step.type!=='complete' && step.type!=='note') done(cur,step.id);
  if(curI < d.steps.length-1) navigate(cur,curI+1);
  else { const di=KEYS.indexOf(cur); if(di<KEYS.length-1) navigate(KEYS[di+1],0); }
}

function back() {
  if(curI>0) { navigate(cur,curI-1); return; }
  const di=KEYS.indexOf(cur);
  if(di>0) { const p=KEYS[di-1]; navigate(p,DATA[p].steps.length-1); }
}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function renderSidebar() {
  const sb=document.getElementById('sidebar');
  let h='<div class="ss"><div class="ssl">🦄 Unicorn NZ 面试速成</div>';
  KEYS.forEach(k=>{
    const d=DATA[k];
    const dn=modDone(k);
    const act=cur===k;
    const icon=dn?'✅':act?'▶️':'⬜';
    h+=`<button class="mbtn${act?' active':''}${dn?' done':''}" onclick="navigate('${k}',0)">
      <span class="si">${icon}</span>
      <span class="ml"><span class="mn">${d.title.split('·')[0].trim()}</span><span class="ms">${d.subtitle}</span></span>
    </button>`;
  });
  h+='</div>';
  sb.innerHTML=h;
  document.getElementById('mb').textContent=DATA[cur].title.split('·')[0].trim();
  document.getElementById('sb').textContent=`🔥 ${doneCount()}/${KEYS.length} 模块`;
}

function updatePct() {
  document.getElementById('pct').textContent=totalPct()+'%';
  document.getElementById('pfill').style.width=totalPct()+'%';
}

function renderStep() {
  const main=document.getElementById('main');
  const d=DATA[cur];
  const step=d.steps[curI];
  const isC=step.type==='complete';

  let pips='';
  d.steps.forEach((s,i)=>{ const cls=i<curI?'done':i===curI?'active':''; pips+=`<div class="pip ${cls}"></div>`; });

  let content='';
  if(step.type==='concept'||step.type==='code') content=step.content;
  else if(step.type==='quiz') content=renderQuiz(step);
  else if(step.type==='note') content=renderNote(step);
  else if(step.type==='complete') { main.innerHTML=`<div class="step-ind">${pips}<span class="smet">${step.title} · ${curI+1}/${d.steps.length}</span></div>${step.content}`; return; }

  const first=curI===0&&KEYS.indexOf(cur)===0;
  main.innerHTML=`
    <div class="step-ind">${pips}<span class="smet">${step.title} · ${curI+1}/${d.steps.length}</span></div>
    <div class="card">${content}</div>
    <div class="nav">
      <button class="btn btn-ghost" onclick="back()" ${first?'disabled':''}>← 上一步</button>
      <button class="btn btn-primary" onclick="fwd()">${step.type==='quiz'?'确认答案 →':step.type==='note'?'已记录 →':'继续 →'}</button>
    </div>`;

  if(step.type==='quiz') wireQuiz(step);
  if(step.type==='note') wireNote(step);
  document.querySelectorAll('.cpy').forEach(b=>{
    b.addEventListener('click',()=>{
      const code=b.closest('.code-block').querySelector('code')?.innerText||'';
      if(code){navigator.clipboard.writeText(code);b.textContent='已复制!';setTimeout(()=>b.textContent='复制',1500);}
    });
  });
  // Checklist interactions
  document.querySelectorAll('.cli input[type=checkbox]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      cb.closest('.cli').classList.toggle('done',cb.checked);
    });
  });
}

function renderQuiz(step) {
  let h='';
  step.questions.forEach((q,qi)=>{
    const opts=q.options.map((o,oi)=>
      `<div class="qopt" data-qi="${qi}" data-oi="${oi}" onclick="selOpt(this,${qi},${oi},${q.answer})">
        <span class="ol">${String.fromCharCode(65+oi)}</span><span>${o}</span>
      </div>`).join('');
    h+=`<div class="qcard" id="qc${qi}"><div class="qq">${qi+1}. ${q.q}</div><div class="qopts">${opts}</div><div class="qfb" id="fb${qi}"></div></div>`;
  });
  return h;
}

function renderNote(step) {
  return `<div class="note-box">
    <div class="note-header">
      <span class="note-icon">📝</span>
      <span class="note-title">${step.title}</span>
    </div>
    <div class="note-prompt">${step.prompt}</div>
    <textarea id="note-area" placeholder="${step.placeholder}" oninput="saveNote(this.value)"></textarea>
  </div>`;
}

function saveNote(val) {
  const st=load(); st['note_'+cur+'_'+curI]=val; save(st);
}
function loadNote() { return load()['note_'+cur+'_'+curI]||''; }

function wireNote(step) {
  const ta=document.getElementById('note-area');
  if(ta) ta.value=loadNote();
}

function wireQuiz(step) {
  const st=load();
  const qk='q-'+cur+'-'+curI;
  const saved=st[qk]||{};
  Object.entries(saved).forEach(([qi,sOi])=>{
    const q=step.questions[parseInt(qi)];
    const card=document.getElementById('qc'+qi);
    if(!card) return;
    const oi=parseInt(sOi);
    card.querySelectorAll('.qopt').forEach(o=>o.classList.add('disabled'));
    const sel=card.querySelector(`[data-oi="${oi}"]`);
    const cor=card.querySelector(`[data-oi="${q.answer}"]`);
    sel.classList.add(oi===q.answer?'correct':'wrong');
    if(oi!==q.answer) cor.classList.add('correct');
    const fb=document.getElementById('fb'+qi);
    fb.className=`qfb show ${oi===q.answer?'correct':'wrong'}`;
    fb.innerHTML=oi===q.answer?`✅ 正确！${q.explanation}`:`❌ 不对。${q.explanation}`;
  });
}

function selOpt(el,qi,oi,answer) {
  if(el.classList.contains('disabled')) return;
  const st=load(); const qk='q-'+cur+'-'+curI;
  if(!st[qk]) st[qk]={}; st[qk][qi]=oi; save(st);
  const card=el.closest('.qcard');
  const q=DATA[cur].steps[curI].questions[qi];
  card.querySelectorAll('.qopt').forEach(o=>o.classList.add('disabled'));
  const cor=card.querySelector(`[data-oi="${q.answer}"]`);
  el.classList.add(oi===q.answer?'correct':'wrong');
  if(oi!==q.answer) cor.classList.add('correct');
  const fb=document.getElementById('fb'+qi);
  fb.className=`qfb show ${oi===q.answer?'correct':'wrong'}`;
  fb.innerHTML=oi===q.answer?`✅ 正确！${q.explanation}`:`❌ 不对。${q.explanation}`;
}

function renderAll() { renderSidebar(); updatePct(); renderStep(); }

// Restore position
const init=load();
if(init._d&&DATA[init._d]) navigate(init._d,init._i||0);
else navigate('mod0',0);
</script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MS365 & HCI 六天速成 · 交互式学习</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3350;
      --accent: #4f8ef7;
      --accent2: #7c5af0;
      --green: #3ecf8e;
      --red: #f47067;
      --yellow: #f0b642;
      --text: #e2e4ef;
      --text-dim: #8b8fa8;
      --radius: 12px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Header ─── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .progress-bar-wrap {
      flex: 1;
      max-width: 400px;
      margin: 0 32px;
    }

    .progress-label {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    /* ─── Layout ─── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ─── Sidebar ─── */
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px 16px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .sidebar-section {
      margin-bottom: 28px;
    }

    .sidebar-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .module-btn {
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .module-btn:hover { background: var(--surface2); }

    .module-btn.active {
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    .module-btn.done .status-icon { color: var(--green); }
    .module-btn.active .status-icon { color: var(--accent); }
    .module-btn.locked .status-icon { color: var(--text-dim); }

    .status-icon { font-size: 0.8rem; width: 20px; text-align: center; }

    .module-label {
      display: flex;
      flex-direction: column;
    }

    .module-name { font-weight: 500; }
    .module-sub { font-size: 0.72rem; color: var(--text-dim); }

    /* ─── Main Content ─── */
    .main {
      flex: 1;
      padding: 40px 48px;
      max-width: 860px;
      overflow-y: auto;
    }

    .step-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .step-pip {
      width: 32px;
      height: 4px;
      border-radius: 99px;
      background: var(--border);
      transition: background 0.3s;
    }

    .step-pip.done { background: var(--green); }
    .step-pip.active { background: var(--accent); }

    .step-meta {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-left: 8px;
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }

    .card h3 {
      font-size: 1.1rem;
      color: var(--accent);
      margin: 24px 0 12px;
    }

    .card p {
      line-height: 1.7;
      color: var(--text-dim);
      margin-bottom: 16px;
    }

    .card ul {
      list-style: none;
      margin: 12px 0;
    }

    .card li {
      padding: 8px 0;
      padding-left: 20px;
      position: relative;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .card li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 700;
    }

    .card li strong {
      color: var(--text);
    }

    /* ─── Concept callout ─── */
    .callout {
      background: var(--surface2);
      border-left: 3px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 16px 20px;
      margin: 16px 0;
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .callout.green { border-color: var(--green); }
    .callout.yellow { border-color: var(--yellow); }
    .callout.red { border-color: var(--red); }

    /* ─── Code block ─── */
    .code-block {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 16px 0;
    }

    .code-header {
      background: var(--surface2);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }

    .code-lang {
      font-size: 0.75rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 3px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    .code-block pre {
      padding: 20px;
      overflow-x: auto;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      color: #e2e4ef;
    }

    .code-block code {
      font-family: inherit;
    }

    /* ─── Terminal emulator ─── */
    .terminal {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 16px 0;
    }

    .terminal-header {
      background: var(--surface2);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .dot.red { background: #ff5f56; }
    .dot.yellow { background: #ffbd2e; }
    .dot.green { background: #27c93f; }

    .terminal-title {
      margin-left: 8px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }

    .terminal-body {
      padding: 16px 20px;
      font-family: 'Cascadia Code', monospace;
      font-size: 0.875rem;
      line-height: 1.8;
      min-height: 120px;
    }

    .terminal-line { color: #8b8fa8; }
    .terminal-line.cmd { color: #e2e4ef; }
    .terminal-line.cmd::before { content: '$ '; color: var(--green); }
    .terminal-line.output { color: #79c0ff; }
    .terminal-line.error { color: var(--red); }
    .terminal-line.success { color: var(--green); }

    /* ─── Quiz ─── */
    .quiz-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin: 16px 0;
    }

    .quiz-q {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .quiz-options { display: flex; flex-direction: column; gap: 10px; }

    .quiz-option {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.95rem;
    }

    .quiz-option:hover:not(.disabled) { border-color: var(--accent); }

    .quiz-option.selected {
      border-color: var(--accent);
      background: rgba(79, 142, 247, 0.1);
    }

    .quiz-option.correct {
      border-color: var(--green);
      background: rgba(62, 207, 142, 0.1);
    }

    .quiz-option.wrong {
      border-color: var(--red);
      background: rgba(244, 112, 103, 0.1);
    }

    .quiz-option.disabled { cursor: default; opacity: 0.7; }

    .opt-letter {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .quiz-feedback {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.9rem;
      display: none;
    }

    .quiz-feedback.show { display: block; }
    .quiz-feedback.correct { background: rgba(62, 207, 142, 0.12); border: 1px solid var(--green); color: var(--green); }
    .quiz-feedback.wrong { background: rgba(244, 112, 103, 0.12); border: 1px solid var(--red); color: var(--red); }

    /* ─── Navigation buttons ─── */
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn {
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
    }

    .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-success {
      background: var(--green);
      color: #0f1117;
    }

    .btn-success:hover { opacity: 0.9; }

    .btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }

    /* ─── Inline code ─── */
    code {
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Cascadia Code', monospace;
      font-size: 0.85em;
      color: #79c0ff;
    }

    /* ─── Concept highlight box ─── */
    .concept-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .concept-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
    }

    .concept-item .term {
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 4px;
      color: var(--accent);
    }

    .concept-item .desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* ─── Completion screen ─── */
    .completion-screen {
      text-align: center;
      padding: 60px 40px;
    }

    .completion-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .completion-screen h2 {
      font-size: 1.8rem;
      margin-bottom: 12px;
    }

    .completion-screen p {
      color: var(--text-dim);
      font-size: 1rem;
      max-width: 480px;
      margin: 0 auto 28px;
    }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { padding: 24px 20px; }
      .concept-grid { grid-template-columns: 1fr; }
    }

    /* ─── Scrollbar ─── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">MS365 & HCI · 六天速成</div>
  <div class="progress-bar-wrap">
    <div class="progress-label">
      <span>总体进度</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>
  <div class="header-right">
    <span class="badge" id="current-module-badge">Day 1</span>
    <span class="badge" id="streak-badge">🔥 已完成 0 天</span>
  </div>
</header>

<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Main -->
  <main class="main" id="main-content">
    <!-- Rendered by JS -->
  </main>
</div>

<script>
// ══════════════════════════════════════════════
// COURSE DATA
// ══════════════════════════════════════════════

const COURSE = {
  day1: {
    title: 'Day 1 · Azure AD 身份与访问管理',
    subtitle: '理解企业身份管理',
    steps: [
      {
        id: 'd1s1', type: 'concept', title: '什么是 Azure AD？',
        content: `
          <h2>Azure AD = 微软的"中央空调"</h2>
          <p>Azure Active Directory（现称 <strong>Microsoft Entra ID</strong>）是微软的云端身份服务。简单说：</p>
          <div class="callout green">
            企业的所有员工账号、权限、应用授权，都在 Azure AD 里管。它就像一栋大楼的<span style="color:var(--accent)">中央空调</span>——所有房间（微软服务）都从同一个地方获取暖气（身份验证）。
          </div>
          <h3>核心能力</h3>
          <ul>
            <li><strong>单点登录（SSO）</strong>：一次登录，访问所有微软服务（Teams、Outlook、Azure...）</li>
            <li><strong>多因素认证（MFA）</strong>：密码 + 手机验证码，双重保险</li>
            <li><strong>条件访问（Conditional Access）</strong>：基于位置/设备决定谁能登录</li>
            <li><strong>应用代理</strong>：让远程员工安全访问本地应用</li>
          </ul>
          <h3>与传统 AD 的区别</h3>
          <div class="concept-grid">
            <div class="concept-item">
              <div class="term">传统 AD（本地）</div>
              <div class="desc">跑在企业自己的 Windows Server 上，只能在办公室内网用</div>
            </div>
            <div class="concept-item">
              <div class="term">Azure AD（云端）</div>
              <div class="desc">托管在微软云，全球各地都能访问，专为云+混合架构设计</div>
            </div>
          </div>
        `
      },
      {
        id: 'd1s2', type: 'quiz', title: '概念小测',
        questions: [
          {
            q: 'Azure AD 的核心作用是什么？',
            options: ['管理文件存储', '管理企业身份和访问权限', '托管企业网站', '发送营销邮件'],
            answer: 1,
            explanation: 'Azure AD 是身份即服务（IdaaS），专门管理"谁可以访问什么"。'
          },
          {
            q: 'SSO（单点登录）最大的好处是？',
            options: ['登录更快', '一次登录后访问所有已授权应用，无需重复输入密码', '节省服务器资源', '让密码更复杂'],
            answer: 1,
            explanation: 'SSO 的核心价值是用户体验+安全性——减少密码疲劳，同时集中管控权限。'
          },
          {
            q: 'MFA（多因素认证）不属于以下哪种因素？',
            options: ['你知道的东西（密码）', '你拥有的东西（手机）', '你是谁（指纹）', '你现在的位置（IP城市）'],
            answer: 3,
            explanation: 'MFA 三要素：你知道的（知识）、你拥有的（持有）、你本身的（生物特征）。"位置"是条件访问的判断依据，不是 MFA 因素。'
          }
        ]
      },
      {
        id: 'd1s3', type: 'concept', title: 'Conditional Access 条件访问',
        content: `
          <h2>Conditional Access：基于上下文决定访问权限</h2>
          <p>条件访问是 Azure AD 的"智能门卫"——不是简单允许/拒绝，而是根据情况决定：</p>
          <div class="callout yellow">
            <strong>IF</strong>（用户在非常用地点）<strong>AND</strong>（用的是个人设备）<strong>THEN</strong>（要求MFA或阻止访问）
          </div>
          <h3>常见条件</h3>
          <ul>
            <li><strong>位置</strong>：信任的 IP 范围 vs 未知地区</li>
            <li><strong>设备状态</strong>：是否已注册/是否合规（MDM）</li>
            <li><strong>风险级别</strong>：微软检测到异常登录行为</li>
            <li><strong>应用类型</strong>：哪些应用需要强制 MFA</li>
          </ul>
          <h3>实际场景</h3>
          <div class="concept-grid">
            <div class="concept-item">
              <div class="term">在家办公 🇳🇿</div>
              <div class="desc">识别为非常用位置 → 要求手机 MFA 验证 → 通过</div>
            </div>
            <div class="concept-item">
              <div class="term">公司内网 🏢</div>
              <div class="desc">在信任 IP 范围内 → 直接放行，无需 MFA</div>
            </div>
          </ul>
        `
      },
      {
        id: 'd1s4', type: 'quiz', title: 'Conditional Access 小测',
        questions: [
          {
            q: '如果用户从新城市登录且使用未注册设备，Conditional Access 最可能触发？',
            options: ['直接允许', '要求 MFA', '永久封禁账号', '删除账号'],
            answer: 1,
            explanation: '非常用位置 + 未注册设备 = 风险升高，条件访问会要求额外验证（MFA）。'
          }
        ]
      },
      {
        id: 'd1s5', type: 'code', title: '动手实验：Azure AD 用户与组',
        content: `
          <h2>来！搭一个简单的身份管理场景</h2>
          <p>我们在 Azure portal 里创建一个用户，并把他加到"实习生"组：</p>

          <div class="terminal">
            <div class="terminal-header">
              <span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span>
              <span class="terminal-title">Azure AD · PowerShell / Portal 模拟</span>
            </div>
            <div class="terminal-body">
              <div class="terminal-line cmd"># 步骤 1：创建新用户</div>
              <div class="terminal-line output">New-AzureADUser -DisplayName "张三" \</div>
              <div class="terminal-line output">  -UserPrincipalName "zhangsan@你的域名.onmicrosoft.com" \</div>
              <div class="terminal-line output">  -MailNickName "zhangsan" -PasswordProfile $password</div>
              <div class="terminal-line success">✅ 用户 zhangsan 已创建</div>
              <br>
              <div class="terminal-line cmd"># 步骤 2：创建"实习生"组</div>
              <div class="terminal-line output">New-AzureADGroup -DisplayName "实习生" \</div>
              <div class="terminal-line output">  -MailNickName "interns" -SecurityEnabled $true</div>
              <div class="terminal-line success">✅ 组 interns 已创建</div>
              <br>
              <div class="terminal-line cmd"># 步骤 3：将用户加入组</div>
              <div class="terminal-line output">Add-AzureADGroupMember -ObjectId (Get-AzureADGroup -SearchString "实习生").ObjectId \</div>
              <div class="terminal-line output">  -RefObjectId (Get-AzureADUser -SearchString "张三").ObjectId</div>
              <div class="terminal-line success">✅ 张三已加入"实习生"组</div>
              <br>
              <div class="terminal-line cmd"># 验证</div>
              <div class="terminal-line output">Get-AzureADGroupMember -ObjectId (Get-AzureADGroup -SearchString "实习生").ObjectId</div>
              <div class="terminal-line output">DisplayName  UserPrincipalName</div>
              <div class="terminal-line output">-----------  -----------------</div>
              <div class="terminal-line output">张三         zhangsan@yourdomain.onmicrosoft.com</div>
            </div>
          </div>

          <div class="callout green">
            <strong>核心逻辑：</strong>用户 → 加组 → 组分配权限。这样只要改组的权限，所有组员自动继承，不用一个个配。
          </div>
        `

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════

const ALL_DAYS = ['day1','day2','day3','day4','day5','day6'];
const STORAGE_KEY = 'ms365-learning-v1';

function getState() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  } catch { return {}; }
}

function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

// Returns steps completed for a day (array of step ids)
function getCompletedSteps(day) {
  const state = getState();
  return state[day] || [];
}

function markStepComplete(day, stepId) {
  const state = getState();
  if (!state[day]) state[day] = [];
  if (!state[day].includes(stepId)) state[day].push(stepId);
  saveState(state);
}

function isDayComplete(day) {
  const dayData = COURSE[day];
  if (!dayData) return false;
  const completed = getCompletedSteps(day);
  return completed.length >= dayData.steps.length;
}

function getCompletedDays() {
  return ALL_DAYS.filter(d => isDayComplete(d)).length;
}

function getTotalProgress() {
  let total = 0, done = 0;
  ALL_DAYS.forEach(day => {
    const dayData = COURSE[day];
    total += dayData.steps.length;
    done += getCompletedSteps(day).length;
  });
  return total > 0 ? Math.round(done / total * 100) : 0;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════

let currentDay = 'day1';
let currentStepIndex = 0;

function navigate(day, stepIndex = 0) {
  currentDay = day;
  currentStepIndex = stepIndex;
  renderSidebar();
  renderStep();
  updateProgressBar();
  window.scrollTo(0, 0);
}

function nextStep() {
  const dayData = COURSE[currentDay];
  const completed = getCompletedSteps(currentDay);
  const currentStep = dayData.steps[currentStepIndex];

  // Mark current step done
  markStepComplete(currentDay, currentStep.id);

  if (currentStepIndex < dayData.steps.length - 1) {
    currentStepIndex++;
    navigate(currentDay, currentStepIndex);
  } else {
    // Day complete
    const dayIdx = ALL_DAYS.indexOf(currentDay);
    if (dayIdx < ALL_DAYS.length - 1) {
      navigate(ALL_DAYS[dayIdx + 1], 0);
    } else {
      navigate('day6', dayData.steps.length - 1);
    }
  }
}

function prevStep() {
  if (currentStepIndex > 0) {
    navigate(currentDay, currentStepIndex - 1);
  } else {
    const dayIdx = ALL_DAYS.indexOf(currentDay);
    if (dayIdx > 0) {
      const prevDay = ALL_DAYS[dayIdx - 1];
      navigate(prevDay, COURSE[prevDay].steps.length - 1);
    }
  }
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const state = getState();
  const completedDays = getCompletedDays();

  let html = `<div class="sidebar-section">
    <div class="sidebar-title">学习模块</div>`;

  ALL_DAYS.forEach(dayId => {
    const dayData = COURSE[dayId];
    const complete = isDayComplete(dayId);
    const active = currentDay === dayId;
    const done = complete;
    const locked = false;

    let icon = '🔒';
    if (done) icon = '✅';
    else if (active) icon = '▶️';

    html += `
    <button class="module-btn ${active ? 'active' : ''} ${done ? 'done' : ''}" onclick="navigate('${dayId}', 0)">
      <span class="status-icon">${icon}</span>
      <span class="module-label">
        <span class="module-name">${dayData.title.split('·')[0].trim()}</span>
        <span class="module-sub">${dayData.subtitle}</span>
      </span>
    </button>`;
  });

  html += '</div>';
  sidebar.innerHTML = html;

  // Badges
  const dayLabel = COURSE[currentDay].title.split('·')[0].trim();
  document.getElementById('current-module-badge').textContent = dayLabel;
  document.getElementById('streak-badge').textContent = `🔥 已完成 ${completedDays} / 6 天`;
}

function updateProgressBar() {
  const pct = getTotalProgress();
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function renderStep() {
  const main = document.getElementById('main-content');
  const dayData = COURSE[currentDay];
  const step = dayData.steps[currentStepIndex];
  const completed = getCompletedSteps(currentDay);
  const isComplete = completed.includes(step.id);

  // Step pips
  let pipsHtml = '';
  dayData.steps.forEach((s, i) => {
    const cls = i < currentStepIndex ? 'done' : i === currentStepIndex ? 'active' : '';
    pipsHtml += `<div class="step-pip ${cls}"></div>`;
  });

  let contentHtml = '';
  let navHtml = '';

  if (step.type === 'concept') {
    contentHtml = step.content;
  } else if (step.type === 'code') {
    contentHtml = step.content;
  } else if (step.type === 'quiz') {
    contentHtml = renderQuiz(step);
  } else if (step.type === 'complete') {
    contentHtml = step.content;
    main.innerHTML = `
      <div class="step-indicator">
        <span class="step-meta">${dayData.title}</span>
      </div>
      ${contentHtml}
    `;
    return;
  }

  navHtml = `
    <div class="nav-buttons">
      <button class="btn btn-ghost" onclick="prevStep()" ${currentStepIndex === 0 && ALL_DAYS.indexOf(currentDay) === 0 ? 'disabled' : ''}>
        ← 上一步
      </button>
      <button class="btn btn-primary" onclick="nextStep()">
        ${isComplete ? '下一步 →' : (step.type === 'quiz' ? '确认答案 →' : '完成并继续 →')}
      </button>
    </div>
  `;

  main.innerHTML = `
    <div class="step-indicator">
      ${pipsHtml}
      <span class="step-meta">${step.title} · ${currentStepIndex + 1}/${dayData.steps.length}</span>
    </div>
    <div class="card">
      ${contentHtml}
    </div>
    ${navHtml}
  `;

  // Wire up quiz if present
  if (step.type === 'quiz') {
    wireQuiz(step);
  }

  // Wire up copy buttons
  document.querySelectorAll('.copy-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const code = btn.closest('.code-block').querySelector('code').innerText;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = '已复制!';
        setTimeout(() => btn.textContent = '复制', 1500);
      });
    });
  });
}

function renderQuiz(step) {
  let html = '';
  step.questions.forEach((q, qi) => {
    const opts = q.options.map((opt, oi) => `
      <div class="quiz-option" data-q="${qi}" data-o="${oi}" onclick="selectOption(this, ${qi}, ${oi}, ${q.answer})">
        <span class="opt-letter">${String.fromCharCode(65 + oi)}</span>
        <span>${opt}</span>
      </div>
    `).join('');

    html += `
    <div class="quiz-card" id="quiz-${qi}">
      <div class="quiz-q">${qi + 1}. ${q.q}</div>
      <div class="quiz-options">${opts}</div>
      <div class="quiz-feedback" id="feedback-${qi}"></div>
    </div>`;
  });
  return html;
}

function wireQuiz(step) {
  // Restore previous answers from localStorage
  const state = getState();
  const quizKey = `quiz-${currentDay}-${currentStepIndex}`;
  const saved = state[quizKey] || {};

  Object.entries(saved).forEach(([qi, selected]) => {
    const card = document.getElementById(`quiz-${qi}`);
    if (!card) return;
    const opts = card.querySelectorAll('.quiz-option');
    const q = step.questions[parseInt(qi)];
    opts.forEach(o => o.classList.add('disabled'));
    const correctOpt = opts[q.answer];
    const selectedOpt = opts[parseInt(selected)];
    if (parseInt(selected) === q.answer) {
      selectedOpt.classList.add('correct');
    } else {
      selectedOpt.classList.add('wrong');
      correctOpt.classList.add('correct');
    }
    const fb = document.getElementById(`feedback-${qi}`);
    fb.className = `quiz-feedback show ${parseInt(selected) === q.answer ? 'correct' : 'wrong'}`;
    fb.innerHTML = parseInt(selected) === q.answer
      ? `✅ 正确！${q.explanation}`
      : `❌ 不对。${q.explanation}`;
  });
}

function selectOption(el, qi, oi, answer) {
  const state = getState();
  const quizKey = `quiz-${currentDay}-${currentStepIndex}`;
  if (!state[quizKey]) state[quizKey] = {};
  state[quizKey][qi] = oi;
  saveState(state);

  const card = el.closest('.quiz-card');
  const q = COURSE[currentDay].steps[currentStepIndex].questions[qi];
  const opts = card.querySelectorAll('.quiz-option');

  opts.forEach(o => o.classList.add('disabled'));
  const correctOpt = opts[q.answer];

  if (oi === q.answer) {
    el.classList.add('correct');
  } else {
    el.classList.add('wrong');
    correctOpt.classList.add('correct');
  }

  const fb = document.getElementById(`feedback-${qi}`);
  fb.className = `quiz-feedback show ${oi === q.answer ? 'correct' : 'wrong'}`;
  fb.innerHTML = oi === q.answer
    ? `✅ 正确！${q.explanation}`
    : `❌ 不对。${q.explanation}`;
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

// Try to restore last position
const saved = getState();
if (saved._lastDay && COURSE[saved._lastDay]) {
  navigate(saved._lastDay, saved._lastStep || 0);
} else {
  navigate('day1', 0);
}

// Auto-save position
const origNavigate = navigate;
window.navigate = function(day, stepIdx) {
  const s = getState();
  s._lastDay = day;
  s._lastStep = stepIdx;
  saveState(s);
  origNavigate(day, stepIdx);
};
</script>
